<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudEase - Conexões</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard.css"> <!-- Legacy styles for sidebar reset -->
    <link rel="stylesheet" href="css/dashboard-v4.css"> <!-- New V4 Styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Local overrides for Search Toolbar to match V4 */
        .toolbar-compact {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 16px;
        }
        
        .search-bar-container {
            position: relative;
            width: 300px;
        }

        .search-bar-container i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 14px;
        }

        .search-bar-input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .search-bar-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
        }

        .filter-btn-compact {
            background: white;
            border: 1px solid #e5e7eb;
            padding: 10px 16px;
            border-radius: 6px;
            color: #4b5563;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .filter-btn-compact:hover {
            background: #f9fafb;
            border-color: #d1d5db;
        }

        /* Action Buttons */
        .action-btn {
            background: none;
            border: none;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            color: #6b7280;
        }
        .action-btn:hover {
            background-color: #f3f4f6;
            color: #111827;
        }

        /* Group Actions Row */
        .actions-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Status Badge */
        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-badge.active {
            background-color: #d1fae5;
            color: #065f46;
        }
        .status-badge.inactive {
            background-color: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body class="dashboard-body dashboard-page-body">
    <nav class="sidebar">
        <div class="brand">
            <i class="fas fa-cloud"></i>
            <h1>CloudEase</h1>
        </div>
        <ul class="nav-links">
            <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
            <li class="active"><a href="connections.html"><i class="fas fa-network-wired"></i> Conexões</a></li>
            <li><a href="servers.html"><i class="fas fa-server"></i> Servidores</a></li>
            <li><a href="sites.html"><i class="fas fa-globe"></i> Sites</a></li>
            <li><a href="domains.html"><i class="fas fa-globe-americas"></i> Domínios</a></li>
            <li><a href="financial.html"><i class="fas fa-wallet"></i> Financeiro</a></li>
            <li><a href="support.html"><i class="fas fa-headset"></i> Suporte</a></li>
            <li><a href="settings.html"><i class="fas fa-cog"></i> Configurações</a></li>
        </ul>
        <div class="user-info">
            <img src="https://via.placeholder.com/40" alt="User Avatar" class="avatar">
            <div class="user-details">
                <span class="user-name">Usuário</span>
                <a href="index.html" class="logout"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <!-- Compact Header V4 -->
        <header class="header-compact">
            <div class="header-left">
                <h2>Gerenciar Conexões</h2>
                <div class="breadcrumbs">
                    <span>CloudEase</span> <i class="fas fa-chevron-right"></i> <span class="active">Conexões</span>
                </div>
            </div>
            <div class="header-actions">
                <!-- Using class new-site-btn for JS compatibility with existing logic -->
                <button class="btn-primary-compact new-site-btn">
                    <i class="fas fa-plus"></i> Nova Conexão
                </button>
            </div>
        </header>

        <div class="dashboard-container-compact">
            
            <!-- Toolbar: Search & Filter -->
            <div class="toolbar-compact">
                <!-- Search wrapper with class 'search-bar' for JS compatibility if needed by querySelector -->
                <div class="search-bar-container search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-bar-input" placeholder="Buscar conexões...">
                </div>
                
                <div class="actions">
                    <button class="filter-btn-compact filter-btn">
                        <i class="fas fa-filter"></i> Filtrar
                    </button>
                </div>
            </div>

            <!-- Main Table Card -->
            <div class="card-compact" style="padding: 0; overflow: hidden;">
                <table class="table-compact connections-table" style="margin: 0; width: 100%;">
                    <thead>
                        <tr>
                            <th>Provedor</th>
                            <th>Nome</th>
                            <th>IP</th>
                            <th>Servidores</th>
                            <th>Data Criação</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Populated by JS -->
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 32px; color: #6b7280;">
                                <i class="fas fa-circle-notch fa-spin" style="margin-right: 8px;"></i> Carregando conexões...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/connections.js"></script>
</body>
</html>
